name: quality-gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run ci:frontend
      - run: npm run security:audit || true

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements.txt
      - run: python -m py_compile backend/main.py backend/firebase_admin_setup.py backend/worker.py
      - run: python -m unittest backend.tests.test_api_contracts backend.tests.test_smoke_flow backend.tests.test_caption_postprocess
      - run: pip install pip-audit && pip-audit -r backend/requirements.txt || true
